name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  local-release-note:
    name: Local release artifacts only
    runs-on: ubuntu-latest
    steps:
      - name: Explain release artifact workflow
        run: |
          echo "macOS release artifacts are built, signed, notarized, and stapled locally."
          echo "Run npm run release:patch, npm run release:minor, or npm run release:major on a macOS machine with Developer ID credentials."
          echo "Artifacts are published to juliakrivchikova/accordagents-releases, not this source repository."
          echo "This workflow intentionally does not build, sign, notarize, or publish macOS artifacts."
