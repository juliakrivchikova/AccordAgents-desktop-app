name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos-arm64:
    name: Build macOS arm64
    runs-on: macos-14
    env:
      NODE_VERSION: "24"
      ELECTRON_CACHE: ${{ github.workspace }}/.electron-cache
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.electron-builder-cache
      APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
      APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
      APPLE_CERT_P12_PASS: ${{ secrets.APPLE_CERT_P12_PASS }}
      APPLE_NOTARIZE_APPLE_ID: ${{ secrets.APPLE_NOTARIZE_APPLE_ID }}
      APPLE_NOTARIZE_PASSWORD: ${{ secrets.APPLE_NOTARIZE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      MACOS_BUNDLE_ID: ${{ vars.MACOS_BUNDLE_ID || 'com.juliakrivchikova.ai-consensus' }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - run: npm ci

      - name: Validate Apple signing inputs
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          for name in \
            APPLE_CODESIGN_IDENTITY \
            APPLE_CERT_P12_BASE64 \
            APPLE_CERT_P12_PASS \
            APPLE_NOTARIZE_APPLE_ID \
            APPLE_NOTARIZE_PASSWORD \
            APPLE_TEAM_ID
          do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing Apple signing inputs: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Configure macOS keychain
        shell: bash
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERT_P12_PASS" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/xcrun
          rm "$RUNNER_TEMP/cert.p12"
          security list-keychains -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "SIGNING_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - run: npm run typecheck

      - name: Build distributables
        run: npm run make -- --platform=darwin --arch=arm64

      - name: Staple notarized app
        shell: bash
        run: |
          set -euo pipefail
          find out -type d -name '*.app' -print0 |
            while IFS= read -r -d '' app_path; do
              xcrun stapler staple "$app_path"
            done

      - name: Notarize and staple DMG artifacts
        shell: bash
        run: |
          set -euo pipefail
          find out/make -type f -name '*.dmg' -print0 |
            while IFS= read -r -d '' dmg_path; do
              echo "Submitting $dmg_path for notarization"
              xcrun notarytool submit "$dmg_path" \
                --apple-id "$APPLE_NOTARIZE_APPLE_ID" \
                --team-id "$APPLE_TEAM_ID" \
                --password "$APPLE_NOTARIZE_PASSWORD" \
                --wait
              xcrun stapler staple "$dmg_path"
            done

      - name: Generate SHA256 manifests
        shell: bash
        run: |
          set -euo pipefail
          find out/make -type f \( -name '*.dmg' -o -name '*.zip' \) -print0 |
            while IFS= read -r -d '' file; do
              shasum -a 256 "$file" > "$file.sha256"
            done

      - name: Validate release assets
        shell: bash
        run: |
          set -euo pipefail
          dmg_count="$(find out/make -type f -name '*.dmg' | wc -l | tr -d ' ')"
          zip_count="$(find out/make -type f -name '*.zip' | wc -l | tr -d ' ')"
          if [[ "$dmg_count" -lt 1 || "$zip_count" -lt 1 ]]; then
            echo "Expected at least one DMG and one ZIP artifact." >&2
            find out/make -type f | sort >&2
            exit 1
          fi

      - uses: actions/upload-artifact@v6
        with:
          name: ai-consensus-macos-arm64
          path: out/make
          if-no-files-found: error

      - name: Cleanup macOS keychain
        if: always() && env.SIGNING_KEYCHAIN != ''
        run: security delete-keychain "$SIGNING_KEYCHAIN"

  release:
    name: Publish GitHub Release
    needs: build-macos-arm64
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Publish release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          assets=(artifacts/**/*.{dmg,zip,sha256})

          if (( ${#assets[@]} == 0 )); then
            echo "No release assets found." >&2
            find artifacts -type f | sort >&2
            exit 1
          fi

          if gh release view "$RELEASE_TAG" --repo "$RELEASE_REPO" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --repo "$RELEASE_REPO" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" --repo "$RELEASE_REPO" --title "$RELEASE_TAG" --generate-notes
          fi
