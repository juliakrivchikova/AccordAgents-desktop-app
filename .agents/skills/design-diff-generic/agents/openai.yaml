interface:
  display_name: "Design Diff (generic)"
  short_description: "Diff a Claude design HTML against a live web app (or two screenshots)"
  default_prompt: "Use $design-diff-generic to compare a Claude-produced design file against the live implementation, ignoring content and item counts, then fix the implementation to match the design per the skill's fix → re-verify loop (converge elements unique to the screen; ask only on shared/pre-existing ones) and re-run until clean."

policy:
  allow_implicit_invocation: true
